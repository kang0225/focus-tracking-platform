name: Deploy ML Service

on:
  push:
    branches: [ main ]
    paths:
      - 'ml-service/**'
      - '.github/workflows/ml-service.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-northeast-2
  ECR_REPOSITORY: focus-tracking-platform-ml-service-repo
  
jobs:
  deploy:
    name: Build → Push → Deploy
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Resolve ML EC2 instance
        id: ml_instance
        run: |
          set -e
          INSTANCE_IDS=$(aws ec2 describe-instances \
            --region "${{ env.AWS_REGION }}" \
            --filters "Name=tag:Name,Values=ml-ec2" "Name=instance-state-name,Values=running" \
            --query 'Reservations[].Instances[].InstanceId' \
            --output text)

          read -r -a IDS <<< "$INSTANCE_IDS"
          if [ "${#IDS[@]}" -ne 1 ]; then
            echo "::error::Expected exactly one running EC2 instance tagged Name=ml-ec2, found ${#IDS[@]}: ${INSTANCE_IDS:-none}"
            exit 1
          fi

          INSTANCE_ID="${IDS[0]}"
          SSM_STATUS=$(aws ssm describe-instance-information \
            --region "${{ env.AWS_REGION }}" \
            --filters "Key=InstanceIds,Values=$INSTANCE_ID" \
            --query 'InstanceInformationList[0].PingStatus' \
            --output text)

          if [ "$SSM_STATUS" != "Online" ]; then
            echo "::error::EC2 instance $INSTANCE_ID is running but not online in SSM. Check SSM Agent, IAM instance profile, and private subnet egress/VPC endpoints."
            exit 1
          fi

          echo "instance_id=$INSTANCE_ID" >> "$GITHUB_OUTPUT"

      - name: Docker 빌드 + ECR 푸시 (네이티브 ARM64)
        id: build
        env:
          ECR_REGISTRY: ${{ steps.ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          set -e
          IMAGE=$ECR_REGISTRY/$ECR_REPOSITORY
          docker build \
            -t $IMAGE:$IMAGE_TAG \
            -t $IMAGE:latest \
            ./ml-service
          docker push $IMAGE:$IMAGE_TAG
          docker push $IMAGE:latest
          echo "image=$IMAGE:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Deploy to ML EC2 via SSM
        run: |
          COMPOSE_B64=$(base64 -w 0 ml-service/docker-compose.yml)

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ steps.ml_instance.outputs.instance_id }}" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy ML Service with Redis" \
            --parameters "commands=[
              \"set -e\",
              \"if ! command -v aws >/dev/null 2>&1; then apt-get update -y && apt-get install -y awscli; fi\",
              \"if ! command -v docker >/dev/null 2>&1; then apt-get update -y && apt-get install -y ca-certificates curl && curl -fsSL https://get.docker.com | sh; fi\",
              \"systemctl enable --now docker\",
              \"mkdir -p /opt/ml-service\",
              \"echo $COMPOSE_B64 | base64 -d > /opt/ml-service/docker-compose.yml\",
              \"echo ENVIRONMENT=dev > /opt/ml-service/.env\",
              \"echo REDIS_HOST=redis >> /opt/ml-service/.env\",
              \"echo REDIS_PORT=6379 >> /opt/ml-service/.env\",
              \"echo AWS_REGION=ap-northeast-2 >> /opt/ml-service/.env\",
              \"echo AWS_DEFAULT_REGION=ap-northeast-2 >> /opt/ml-service/.env\",
              \"echo BEDROCK_REGION=ap-northeast-2 >> /opt/ml-service/.env\",
              \"echo BEDROCK_MODEL_ID=anthropic.claude-sonnet-4-5-20250929-v1:0 >> /opt/ml-service/.env\",
              \"echo BEDROCK_MAX_OUTPUT_TOKENS=700 >> /opt/ml-service/.env\",
              \"echo BEDROCK_TEMPERATURE=0.2 >> /opt/ml-service/.env\",
              \"cd /opt/ml-service\",
              \"aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin ${{ steps.ecr.outputs.registry }}\",
              \"docker pull ${{ steps.build.outputs.image }}\",
              \"ML_SERVICE_IMAGE=${{ steps.build.outputs.image }} docker compose -f docker-compose.yml up -d\",
              \"docker image prune -f\"
            ]" \
            --region "${{ env.AWS_REGION }}" \
            --query "Command.CommandId" \
            --output text)

          echo "SSM Command ID: $COMMAND_ID"

          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ steps.ml_instance.outputs.instance_id }}" \
            --region "${{ env.AWS_REGION }}" || true

          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ steps.ml_instance.outputs.instance_id }}" \
            --region "${{ env.AWS_REGION }}" \
            --query '{Status:Status,Stdout:StandardOutputContent,Stderr:StandardErrorContent}' \
            --output json
