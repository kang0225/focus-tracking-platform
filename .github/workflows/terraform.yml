name: Terraform

on:
  pull_request:
    branches: [main]
    paths:
      - "terraform/**"
      - ".github/workflows/terraform.yml"
  push:
    branches: [main]
    paths:
      - "terraform/**"
      - ".github/workflows/terraform.yml"
  workflow_dispatch:
    inputs:
      apply:
        description: "Run terraform apply after plan on the main branch"
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: "ap-northeast-2"
  AWS_DEFAULT_REGION: "ap-northeast-2"
  TF_VERSION: "1.9.8"
  TF_IN_AUTOMATION: "true"
  TF_INPUT: "false"
  TF_CLI_ARGS: "-no-color"
  TF_CLI_ARGS_init: "-lockfile=readonly"
  TF_CLI_ARGS_plan: "-lock-timeout=5m"
  TF_CLI_ARGS_apply: "-lock-timeout=5m"
  TF_PLUGIN_CACHE_DIR: "${{ github.workspace }}/.terraform.d/plugin-cache"

  TF_VAR_aws_region: "ap-northeast-2"
  TF_VAR_project_name: "focus-tracking-platform"
  TF_VAR_environment: "dev"
  TF_VAR_stack_name: "main"
  TF_VAR_vpc_cidr: "10.0.0.0/16"
  TF_VAR_az_a: "ap-northeast-2a"
  TF_VAR_az_c: "ap-northeast-2c"
  TF_VAR_public_subnet_a_cidr: "10.0.1.0/24"
  TF_VAR_public_subnet_c_cidr: "10.0.2.0/24"
  TF_VAR_private_app_subnet_a_cidr: "10.0.11.0/24"
  TF_VAR_private_app_subnet_c_cidr: "10.0.12.0/24"
  TF_VAR_private_db_subnet_a_cidr: "10.0.21.0/24"
  TF_VAR_private_db_subnet_c_cidr: "10.0.22.0/24"
  TF_VAR_domain_name: "study-room.click"
  TF_VAR_alert_emails: ${{ vars.ALERT_EMAILS }}
  TF_VAR_datadog_api_key: ${{ secrets.DATADOG_API_KEY }}
  TF_VAR_datadog_app_key: ${{ secrets.DATADOG_APP_KEY }}
  TF_VAR_postgres_master_username: ${{ secrets.POSTGRES_MASTER_USERNAME }}

jobs:
  terraform:
    name: Terraform dev
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: dev
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
    concurrency:
      group: terraform-dev
      cancel-in-progress: false

    defaults:
      run:
        shell: bash
        working-directory: ./terraform/environments/dev

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform fmt
        working-directory: .
        run: terraform fmt -diff -recursive

      - name: Restore Terraform provider cache
        uses: actions/cache@v4
        with:
          path: .terraform.d/plugin-cache
          key: terraform-${{ runner.os }}-${{ hashFiles('terraform/environments/dev/.terraform.lock.hcl') }}
          restore-keys: |
            terraform-${{ runner.os }}-

      - name: Prepare Terraform provider cache
        working-directory: .
        run: mkdir -p "$TF_PLUGIN_CACHE_DIR"

      - name: Terraform init
        run: terraform init

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        run: |
          terraform plan -out=tfplan
          terraform show -no-color tfplan > plan.txt

          {
            echo "### Terraform plan: dev"
            echo
            echo '```terraform'
            sed -n '1,250p' plan.txt
            if [ "$(wc -l < plan.txt)" -gt 250 ]; then
              echo
              echo "... truncated. Check the job log for the full plan."
            fi
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Terraform apply
        if: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') || (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main' && inputs.apply) }}
        run: terraform apply -auto-approve tfplan
