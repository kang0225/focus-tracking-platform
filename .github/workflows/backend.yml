name: Deploy Backend

on:
  push:
    branches: [ main ]
    paths:
      - 'backend/**'
      - 'appspec.yaml'
      - '.github/workflows/backend.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-northeast-2
  ECR_REPOSITORY: focus-tracking-platform-repo
  ECS_CLUSTER: focus-tracking-platform-dev-cluster
  ECS_SERVICE: focus-tracking-platform-dev-svc
  ECS_TASK_FAMILY: focus-tracking-platform-dev-task
  CODEDEPLOY_APP: focus-tracking-platform-dev-cdapp
  CODEDEPLOY_GROUP: focus-tracking-platform-dev-dg
  CONTAINER_NAME: app

jobs:
  deploy:
    name: Build → Push → Deploy
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      # ↓↓↓ 추가: BuildKit 활성화 (캐시 마운트/registry 캐시 사용 위해 필수)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ↓↓↓ 교체: docker build → build-push-action (레지스트리 캐시 사용)
      - name: Docker 빌드 + ECR 푸시 (캐시 활용)
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          platforms: linux/arm64
          push: true
          provenance: false
          tags: |
            ${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
            ${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
          cache-from: |
            type=registry,ref=${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:buildcache
          cache-to: |
            type=registry,ref=${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:buildcache,mode=max

      # ↓↓↓ 추가: 다음 step들이 쓸 이미지 URI를 output으로 노출
      - name: Compose image URI
        id: image
        run: |
          echo "uri=${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Download current task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition ${{ env.ECS_TASK_FAMILY }} \
            --query taskDefinition \
            > taskdef.json

      - name: 새 Task Definition 렌더링 (이미지 + 환경변수)
        id: render
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: taskdef.json
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ steps.image.outputs.uri }}
          environment-variables: |
            NODE_ENV=production
            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
            AUTH_SECRET=${{ secrets.AUTH_SECRET }}
            GOOGLE_REDIRECT_URI=${{ secrets.GOOGLE_REDIRECT_URI }}
            APP_URL=${{ secrets.APP_URL }}
            REDIS_HOST=${{ secrets.REDIS_HOST }}
            REDIS_PORT=${{ secrets.REDIS_PORT }}
            ML_SERVICE_URL=${{ secrets.ML_SERVICE_URL }}

      - name: Deploy to ECS (CodeDeploy Blue/Green)
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          codedeploy-appspec: appspec.yaml
          codedeploy-application: ${{ env.CODEDEPLOY_APP }}
          codedeploy-deployment-group: ${{ env.CODEDEPLOY_GROUP }}
          wait-for-service-stability: true