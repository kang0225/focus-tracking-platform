name: Deploy Backend

on:
  push:
    branches: [ main ]
    paths:
      - 'backend/**'
      - 'appspec.yaml'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-northeast-2
  ECR_REPOSITORY: focus-tracking-platform-repo
  ECS_CLUSTER: focus-tracking-platform-dev-cluster
  ECS_SERVICE: focus-tracking-platform-dev-svc
  ECS_TASK_FAMILY: focus-tracking-platform-dev-task
  CODEDEPLOY_APP: focus-tracking-platform-dev-cdapp
  CODEDEPLOY_GROUP: focus-tracking-platform-dev-dg
  CONTAINER_NAME: app

jobs:
  deploy:
    name: Build → Push → Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: AWS 인증 (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # ★ 추가: ARM64 빌드를 위해 QEMU + Buildx 설정
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: ECR 로그인
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      # ★ 변경: docker build → docker buildx build --platform linux/arm64
      - name: Docker 빌드 + ECR 푸시 (ARM64)
        id: build
        env:
          ECR_REGISTRY: ${{ steps.ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          set -e
          IMAGE=$ECR_REGISTRY/$ECR_REPOSITORY
          docker buildx build \
            --platform linux/arm64 \
            -t $IMAGE:$IMAGE_TAG \
            -t $IMAGE:latest \
            --push \
            ./backend
          echo "image=$IMAGE:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: 현재 Task Definition 다운로드
        run: |
          aws ecs describe-task-definition \
            --task-definition ${{ env.ECS_TASK_FAMILY }} \
            --query taskDefinition \
            > taskdef.json

      - name: 새 Task Definition 렌더링 (이미지만 교체)
        id: render
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: taskdef.json
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ steps.build.outputs.image }}
          environment-variables: |
            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
            AUTH_SECRET=${{ secrets.AUTH_SECRET }}

      - name: ECS 배포 (CodeDeploy Blue/Green)
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          codedeploy-appspec: appspec.yaml
          codedeploy-application: ${{ env.CODEDEPLOY_APP }}
          codedeploy-deployment-group: ${{ env.CODEDEPLOY_GROUP }}
          wait-for-service-stability: true