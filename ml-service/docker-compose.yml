services:
  ml-service:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${ML_SERVICE_IMAGE:-focus-tracking-ml-service:latest}
    container_name: ml-service
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      AWS_REGION: ${AWS_REGION:-ap-northeast-2}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-ap-northeast-2}
      BEDROCK_REGION: ${BEDROCK_REGION:-ap-northeast-2}
      BEDROCK_MODEL_ID: ${BEDROCK_MODEL_ID:-anthropic.claude-sonnet-4-5-20250929-v1:0}
      BEDROCK_MAX_OUTPUT_TOKENS: ${BEDROCK_MAX_OUTPUT_TOKENS:-700}
      BEDROCK_TEMPERATURE: ${BEDROCK_TEMPERATURE:-0.2}
      BEDROCK_CONNECT_TIMEOUT_SECONDS: ${BEDROCK_CONNECT_TIMEOUT_SECONDS:-3}
      BEDROCK_READ_TIMEOUT_SECONDS: ${BEDROCK_READ_TIMEOUT_SECONDS:-20}
      BEDROCK_MAX_ATTEMPTS: ${BEDROCK_MAX_ATTEMPTS:-2}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - ml-network
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3).read()",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - ml-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redis_data:/data

networks:
  ml-network:
    driver: bridge

volumes:
  redis_data:
