services:
  ml-service:
    image: ${ML_SERVICE_IMAGE}
    container_name: ml-service
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - /opt/ml-service/.env
    depends_on:
      - redis
    networks:
      - ml-network

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - ml-network

networks:
  ml-network:
    driver: bridge